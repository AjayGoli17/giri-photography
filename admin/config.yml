backend:
  name: git-gateway
  branch: main

# Default fallback (used only if a field doesn't override it below)
media_folder: "service"
public_folder: "/service"

collections:

  # ------------------------------------------------------------------
  # PHOTO CATEGORIES — one file per category, each holding an ordered
  # list of images. portfolio.js fetches these at runtime to build
  # both the category cover thumbnail and the 10-photo gallery grid.
  # Each field below has its own media_folder/public_folder pointing
  # at that category's own image folder, so Add/Replace/Delete in the
  # CMS reads and writes the correct place.
  # ------------------------------------------------------------------
  - name: "portfolio"
    label: "Photo Categories"
    files:
      - name: "weddings"
        label: "Weddings"
        file: "data/portfolio/weddings.json"
        fields:
          - { label: "Category Name", name: "name", widget: "string" }
          - label: "Photos"
            name: "images"
            widget: "list"
            field: { label: "Photo", name: "src", widget: "image", media_folder: "/wedding", public_folder: "/wedding" }

      - name: "pre-wedding"
        label: "Pre-Wedding"
        file: "data/portfolio/pre-wedding.json"
        fields:
          - { label: "Category Name", name: "name", widget: "string" }
          - label: "Photos"
            name: "images"
            widget: "list"
            field: { label: "Photo", name: "src", widget: "image", media_folder: "/prewedding", public_folder: "/prewedding" }

      - name: "engagement"
        label: "Engagement"
        file: "data/portfolio/engagement.json"
        fields:
          - { label: "Category Name", name: "name", widget: "string" }
          - label: "Photos"
            name: "images"
            widget: "list"
            field: { label: "Photo", name: "src", widget: "image", media_folder: "/engagement", public_folder: "/engagement" }

      - name: "haldi"
        label: "Haldi"
        file: "data/portfolio/haldi.json"
        fields:
          - { label: "Category Name", name: "name", widget: "string" }
          - label: "Photos"
            name: "images"
            widget: "list"
            field: { label: "Photo", name: "src", widget: "image", media_folder: "/haldi", public_folder: "/haldi" }

      - name: "birthdays"
        label: "Birthdays"
        file: "data/portfolio/birthdays.json"
        fields:
          - { label: "Category Name", name: "name", widget: "string" }
          - label: "Photos"
            name: "images"
            widget: "list"
            field: { label: "Photo", name: "src", widget: "image", media_folder: "/birthdays", public_folder: "/birthdays" }

      - name: "dhoti-ceremony"
        label: "Dhoti Ceremony"
        file: "data/portfolio/dhoti-ceremony.json"
        fields:
          - { label: "Category Name", name: "name", widget: "string" }
          - label: "Photos"
            name: "images"
            widget: "list"
            field: { label: "Photo", name: "src", widget: "image", media_folder: "/dhothi", public_folder: "/dhothi" }

      - name: "saree-ceremony"
        label: "Saree Ceremony"
        file: "data/portfolio/saree-ceremony.json"
        fields:
          - { label: "Category Name", name: "name", widget: "string" }
          - label: "Photos"
            name: "images"
            widget: "list"
            field: { label: "Photo", name: "src", widget: "image", media_folder: "/halfsaree", public_folder: "/halfsaree" }

      - name: "newborn"
        label: "Newborn"
        file: "data/portfolio/newborn.json"
        fields:
          - { label: "Category Name", name: "name", widget: "string" }
          - label: "Photos"
            name: "images"
            widget: "list"
            field: { label: "Photo", name: "src", widget: "image", media_folder: "/newborn", public_folder: "/newborn" }

      - name: "maternity"
        label: "Maternity"
        file: "data/portfolio/maternity.json"
        fields:
          - { label: "Category Name", name: "name", widget: "string" }
          - label: "Photos"
            name: "images"
            widget: "list"
            field: { label: "Photo", name: "src", widget: "image", media_folder: "/maternity", public_folder: "/maternity" }

      - name: "solo-portraits"
        label: "Solo Portraits"
        file: "data/portfolio/solo-portraits.json"
        fields:
          - { label: "Category Name", name: "name", widget: "string" }
          - label: "Photos"
            name: "images"
            widget: "list"
            field: { label: "Photo", name: "src", widget: "image", media_folder: "/single", public_folder: "/single" }

  # ------------------------------------------------------------------
  # TEAM — the 5 team member cards on team.html. Fixed at exactly 5
  # entries (min/max) because the page uses a hand-positioned masonry
  # layout (member-1..member-5 each have their own grid position/size
  # in team.css) — adding or removing a card would break that layout.
  # team.js reads this to fill in each card's photo/name/role.
  # ------------------------------------------------------------------
  - name: "team"
    label: "Team"
    files:
      - name: "team"
        label: "Team Members"
        file: "data/team.json"
        fields:
          - label: "Members"
            name: "members"
            widget: "list"
            min: 5
            max: 5
            summary: "{{name}} — {{role}}"
            fields:
              - { label: "Internal ID (do not change)", name: "id", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role / Title", name: "role", widget: "string" }
              - { label: "Photo", name: "photo", widget: "image", media_folder: "/team", public_folder: "/team" }

  # ------------------------------------------------------------------
  # HOMEPAGE SERVICES PREVIEW — the 6 service cards on the homepage
  # ("Our Services" section on index.html). This is a separate, smaller
  # preview list from the main Services page — kept independent on
  # purpose so the two can be edited without needing to match. Fixed
  # at exactly 6 entries (min/max) to match the existing layout.
  # home.js reads this to fill in each card's photo/name/price.
  # ------------------------------------------------------------------
  - name: "home-services"
    label: "Homepage Services Preview"
    files:
      - name: "home-services"
        label: "Homepage Cards"
        file: "data/home-services.json"
        fields:
          - label: "Cards"
            name: "cards"
            widget: "list"
            min: 6
            max: 6
            summary: "{{name}} — {{price}}"
            fields:
              - { label: "Internal ID (do not change)", name: "id", widget: "string" }
              - { label: "Service Name", name: "name", widget: "string" }
              - { label: "Price Text", name: "price", widget: "string", hint: "e.g. \"From ₹8,000\" — free text so you can phrase it however you like" }
              - { label: "Photo", name: "photo", widget: "image", media_folder: "/service", public_folder: "/service" }

  # ------------------------------------------------------------------
  # CINEMATIC STORIES — the video-reel cards on the Portfolio page,
  # kept separate from the photo categories above. Not fixed at any
  # count — the client can add, delete or reorder video cards freely.
  # portfolio.js fetches this at runtime to build the video grid.
  # ------------------------------------------------------------------
  - name: "cinematic"
    label: "Cinematic Stories (Videos)"
    files:
      - name: "cinematic"
        label: "Video Reels"
        file: "data/cinematic.json"
        fields:
          - label: "Video Reels"
            name: "videos"
            widget: "list"
            summary: "{{title}} — {{category}}"
            fields:
              - { label: "Internal ID (do not change)", name: "id", widget: "string" }
              - { label: "Category Label", name: "category", widget: "string", hint: "Small label above the title, e.g. \"Cinematic Story\"" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Poster Image", name: "poster", widget: "image", media_folder: "/", public_folder: "/", hint: "Shown before the video plays" }
              - { label: "Video File", name: "video", widget: "file", media_folder: "/", public_folder: "/", hint: "Upload an .mp4 video file" }
              - { label: "Portrait Orientation?", name: "portrait", widget: "boolean", default: false, hint: "Turn on if this video is vertical/portrait rather than widescreen" }

  # ------------------------------------------------------------------
  # SERVICE PRICING — a single file holding every service's price.
  # service.js reads this to fill in the ₹ amounts on service.html.
  # ------------------------------------------------------------------
  - name: "services"
    label: "Service Pricing"
    files:
      - name: "services"
        label: "Services"
        file: "data/services.json"
        fields:
          - label: "Services"
            name: "services"
            widget: "list"
            summary: "{{name}} — ₹{{price}}"
            fields:
              - { label: "Internal ID (do not change)", name: "id", widget: "string" }
              - { label: "Service Name", name: "name", widget: "string" }
              - { label: "Price (₹)", name: "price", widget: "number", value_type: "int" }
