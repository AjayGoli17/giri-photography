<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Studio - Clip Mask Reveal</title>
<style>
  /* ========================================= */
  /* BASE LAYOUT                               */
  /* ========================================= */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background-color: #f6f4ee; /* Editorial beige background */
    font-family: 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px;
  }

  .grid-container {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 24px;
    width: 100%;
    max-width: 1100px;
    height: 85vh;
  }

  .grid-item {
    position: relative;
    overflow: hidden;
    background: #eae8e1;
    border-radius: 2px;
  }

  .grid-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    /* Added a smooth transition for the hover effect */
    transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .left-item {
    grid-row: 1 / span 2;
  }

  .right-top-item {
    grid-row: 1 / span 1;
  }

  .right-bottom-item {
    grid-row: 2 / span 1;
  }

  .label {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: rgba(255, 255, 255, 0.9);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 10;
  }

  /* ========================================= */
  /* CLIP MASK REVEAL ANIMATION                */
  /* ========================================= */
  
  /* 1. Start all images hidden with a clip-path pushed to the bottom */
  .grid-item {
    clip-path: inset(100% 0 0 0);
    animation: maskReveal 1.2s cubic-bezier(0.77, 0, 0.175, 1) forwards;
  }

  /* 2. Stagger the reveals so they don't all appear at the exact same time */
  .left-item {
    animation-delay: 0s;
  }
  
  .right-top-item {
    animation-delay: 0.15s;
  }
  
  .right-bottom-item {
    animation-delay: 0.3s;
  }

  /* 3. The animation keyframes that pull the mask upward */
  @keyframes maskReveal {
    to {
      clip-path: inset(0 0 0 0);
    }
  }

  /* ========================================= */
  /* HOVER EFFECT (Bonus)                      */
  /* ========================================= */
  
  .grid-item:hover img {
    transform: scale(1.04);
  }

</style>
</head>
<body>

<div class="grid-container">
  <!-- Left Item -->
  <div class="grid-item left-item">
    <img src="https://images.unsplash.com/photo-1511884642898-4c92249e20b6?auto=format&fit=crop&w=800&q=80" alt="Architecture">
    <span class="label">ARCHITECTURE</span>
  </div>

  <!-- Top Right Item -->
  <div class="grid-item right-top-item">
    <img src="https://images.unsplash.com/photo-1583939000140-5e34749f7ba3?auto=format&fit=crop&w=600&q=80" alt="Editorial">
    <span class="label">EDITORIAL</span>
  </div>

  <!-- Bottom Right Item -->
  <div class="grid-item right-bottom-item">
    <img src="https://images.unsplash.com/photo-1542038784456-1ea8e935640e?auto=format&fit=crop&w=600&q=80" alt="Equipment">
    <span class="label">EQUIPMENT</span>
  </div>
</div>

</body>
</html>
